function item_apply_write_row(sel, obj) {//row 증감
	if (sel == "1") {//row 추가
		$("#id_item_table > tbody:last").append(item_apply_write('', ''));

		var i = 0;
		for (i=0; i<Number($("#max_sales").val()); i++) {
			if ($("#addr_"+i).length > 0) {
				eval("new Observe(document.getElementById('addr_"+i+"'))");
				if (i != sItemIdx && $("#sameaddr").is(":checked") == true) {//체크
					$("#addr_"+i).val(sItemAddr);
					$("#addr_"+i).css({"background-color":"#f1f1f1"}).attr("readonly", true);
				}
			}
		}
	}
	else if (sel == "2") {//마지막 row 삭제
		if (Number($("#cnt_sales").val()) <= 1) {
			alert("1개 이하는 삭제할 수 없습니다.");
			return;
		}

		$("#id_item_table > tbody:last > tr:last").remove();
	}
	else if (sel == "3") {//해당 row 삭제
		if (Number($("#cnt_sales").val()) <= 1) {
			alert("1개 이하는 삭제할 수 없습니다.");
			return;
		}

		$(obj).parent().parent().remove();
	}
	item_apply_write_no();
	set_apply_write('amount', '');
	set_apply_write('item_addridx', '');
}

function item_apply_write_no() {//No 일련번호

	}
	iItemsCnt = iCnt - 1; //상단 메뉴는 제외
	$("#cnt_sales").val(iItemsCnt);
}

function calc_row_box(el) {
	// el: input 요소 또는 인덱스 숫자
	var idx;
	if (typeof el === "object" && el.id) {
		idx = el.id.replace("qty_", "").replace("rowbox1_", "");
	} else {
		idx = el;
	}
	var qty    = Number($("#qty_"     + idx).val().replace(/,/g, "")) || 0;
	var perBox = Number($("#rowbox1_" + idx).val().replace(/,/g, "")) || 0;
	var boxCnt = "";
	var boxTot = "";

	if (qty > 0 && perBox > 0) {
		boxCnt = Math.ceil(qty / perBox);
		boxTot = boxCnt;
	}
	$("#rowbox2_"   + idx).val(boxCnt);
	$("#rowboxtot_" + idx).val(boxTot);
}

function upload_excel_apply_write(input) {

	if (!confirm("엑셀 파일을 업로드하여 내용을 불러오겠습니까?")) {

	$("#mode").val("upload");
	var frm = document.myform;
	frm.target = "iframe_exe";
	frm.action = sEndURL;

}

function cursor_apply_write(event, curid, pass) {//커서 넘기기

		if (pass == "1") {
			item_apply_write_row('1', '');
		}
		$("#"+curid).focus();
	}
}

<script language="javascript" type="text/javascript">
function set_apply_write(sel, obj) {
	var i = 0;
	var j = 0;
	if (sel == "amount") {
		var amount = 0;
		for (i=0; i<iItemsMax; i++) {
			amount += Number($("#qty_"+i).val().replace(/,/g, ""));
		}
		$("#amount").val(amount);
		// 수량 변경 시 각 행 박스 자동 재계산
		for (i=0; i<iItemsMax; i++) {
			if ($("#qty_"+i).length > 0) {
				calc_row_box(i);
			}
		}
	}
	else if (sel == "phone") {
		obj.value = _phone_replace(obj.value);
	}
	else if (sel == "buymthd") {
		if (obj.value == "5") {//저자증정본
			$("#state").val('1');
		}
		else {
			$("#state").val('2');
		}
	}
	else if (sel == "dlvmthd") {//배송방법
		var bgc = "";
		var dis = "";
		if (obj.value == "9" || $("#dlvmthd").val() == "9") {//다마스
			bgc = "#ffffff";
			dis = false;
		}
		else {
			bgc = "#f1f1f1";
			dis = true;
		}
		$("#boxqty1").css({"background":bgc}).prop("disabled", dis);
		$("#boxqty2").css({"background":bgc}).prop("disabled", dis);
		$("#boxamt1").css({"background":bgc}).prop("disabled", dis);
		$("#boxamt2").css({"background":bgc}).prop("disabled", dis);
		$("#boxtot").css({"background":bgc}).prop("disabled", dis);
	}
	else if (sel == "box") {
		if ($("#dlvmthd").val() != "9") {
			return;
		}
		var amount = Number($("#amount").val());
		var qty1 = Number($("#boxqty1").val());
		var qty2 = Number($("#boxqty2").val());
		var amt1 = Number($("#boxamt1").val());
		var amt2 = Number($("#boxamt2").val());
		var tot = 0;

		if (qty1 > 0) {
			if (!amt1) {
				amt1 = 0;
			}
		}
		if (amount > 0) {
			qty2 = amount - (qty1 * amt1);
			if (qty2 > 0) {
				amt2 = 1;
			}
			else {
				qty2 = "";
				amt2 = "";
			}
			$("#boxqty2").val(qty2);
			$("#boxamt2").val(amt2);
		}

		tot = amt1 + amt2;
		$("#boxtot").val(tot);
	}
	else if (sel == "item_addridx") {//기준 주소 찾기
		var addr = "";
		for (i=0; i<Number($("#max_sales").val()); i++) {
			if (!addr && $("#addr_"+i).length > 0) {
				addr = $("#addr_"+i).val();
				j = i;
				break;
			}
		}
		sItemAddr= addr;
		sItemIdx = j;
	}
}


function change_apply_write(sel, val) {
	var i = 0;
	var j = 0;
	if (sel == "item_addr") {
		if ($("#sameaddr").is(":checked") == true) {//체크
			for (i=0; i<Number($("#max_sales").val()); i++) {
				if ($("#addr_"+i).length > 0) {
					sItemIdx = i;
					break;
				}
			}
			sItemAddr = $("#addr_"+sItemIdx).val();
			if (sItemAddr) {
				change_apply_write('sameaddr', '');
			}
		}
	}
	else if (sel == "sameaddr") {
		if ($("#sameaddr").is(":checked") == true) {//체크
			for (i=0; i<Number($("#max_sales").val()); i++) {
				if ($("#addr_"+i).length > 0) {
					sItemAddr = $("#addr_"+i).val();
					sItemIdx = i;
					break;
				}
			}
			for (i=0; i<Number($("#max_sales").val()); i++) {
				if (i != sItemIdx && $("#addr_"+i).length > 0) {
					$("#addr_"+i).val(sItemAddr);
					$("#addr_"+i).css({"background-color":"#f1f1f1"}).attr("readonly", true);
				}
			}
		}
		else {//해제
			for (i=0; i<Number($("#max_sales").val()); i++) {
				if (i != sItemIdx && $("#addr_"+i).length > 0) {
					$("#addr_"+i).val('');
					$("#addr_"+i).css({"background-color":"#ffffff"}).attr("readonly", false);
				}
			}
		}
	}
}


function submit_apply_write() {//등록
	var frm = document.myform;
	var i 	= j = 0;
	var iCnt = $("#id_item_table > tbody").children().length; //폼목 개수

	if (frm.mode.value != "upload") {//업로드가 아니면..
		for (i=0; i<iCnt; i++) {
			if ($.trim($("#item_"+i).val())) {
				j++;
			}
		}
		if (j <= 0) {
			alert("도서를 입력해 주세요.");
			$("#item_0").focus();
			return;
		}
		if (!frm.wrtday.value.replace(/ /g, "")) {
		   	alert("신청일을 입력해 주세요.");
		   	frm.wrtday.focus();
		   	return;
		}
		if (!frm.name.value.replace(/ /g, "")) {
		   	alert("신청자를 입력해 주세요.");
		   	frm.name.focus();
		   	return;
		}
		if (!frm.amount.value.replace(/ /g, "")) {
	   		alert("수량을 입력해 주세요.");
		   	frm.amount.focus();
		   	return;
		}
		if (!frm.duedate.value.replace(/ /g, "")) {
		   	alert("출고예정일을 입력해 주세요.");
		   	frm.duedate.focus();
		   	return;
		}
		/*
		if (!frm.recename.value.replace(/ /g, "")) {
		   	alert("수취인을 입력해 주세요.");
		   	frm.recename.focus();
		   	return;
		}
		if (!frm.recephone.value.replace(/ /g, "")) {
		   	alert("연락처를 입력해 주세요.");
		   	frm.recephone.focus();
		   	return;
		}
		*/
	}

	if (frm.mode.value == "modify") {
		if (!confirm("수정하시겠습니까?")) {
			return;
		}
	}

	frm.target = "iframe_exe";
	frm.action = sEndURL;
	frm.submit();
}


function remove_apply_write(no) {//삭제
	if (confirm("삭제를 하시겠습니까?")) {
		$("#iframe_exe").attr("src", sEndURL+"?mode=remove&no="+no);

//전화번호 설정
function _phone_hyphen_remove(str) {//'-' 제거
	var val = "";
	var i = 0;
	for (i=0; i<str.length; i++) {
	    if (str.charAt(i) != "-") {
	    	val += str.charAt(i)
	    }
	}
	return val
}

function _phone_length(str) {// 0-127 1byte, 128~2byte 길이
	var val = 0;
	var i = 0;
    for(i=0; i<str.length; i++) {
        if (str.charCodeAt(i) > 127) {
            val += 2;
        }
        else {
            val++;
        }
    }
	return val;
}

function _phone_replace(str) {//설정
    var only = _phone_hyphen_remove(str);
    var val = only;

    if (event.keyCode == 8 ) {
    	 return str;
    }
    if (only.substring(0,2) == 02) { // 서울전화번호일 경우  10자리까지만 나타나교 그 이상의 자리수는 자동삭제
    	if (_phone_length(only) <= 1) val = only;
    	if (_phone_length(only) == 2) val = only + "-";
    	if (_phone_length(only) == 4) val = only.substring(0,2) + "-" + only.substring(2,3);
    	if (_phone_length(only) == 4) val = only.substring(0,2) + "-" + only.substring(2,4);
    	if (_phone_length(only) == 5) val = only.substring(0,2) + "-" + only.substring(2,5);
    	if (_phone_length(only) == 6) val = only.substring(0,2) + "-" + only.substring(2,6);

    }
    else if (only.substring(0,2) == 05 ) {  // 05로 시작되는 번호 체크
        if (only.substring(2,3) == 0 ) {  // 050으로 시작되는지 따지기 위한 조건문

      	else {
            if (_phone_length(only) <= 2) val = only;

    else if(only.substring(0,2) == 03 || only.substring(0,2) == 04  || only.substring(0,2) == 06  || only.substring(0,2) == 07  || only.substring(0,2) == 08 ) {//서울전화번호가 아닌 번호일 경우(070,080포함, 050번호가 문제군요)

    	if (_phone_length(only) == 11) val = only.substring(0,3) + "-" + only.substring(3,7) + "-" + only.substring(7,11);
    	if (_phone_length(only) == 12) val = only.substring(0,3) + "-" + only.substring(3,7) + "-" + only.substring(7,11);
    }
    else if(only.substring(0,2) == 01) {//휴대폰일 경우
        if (_phone_length(only) <= 2) val = only;
        if (_phone_length(only) == 3) val = only + "-";
        if (_phone_length(only) == 4) val = only.substring(0,3) + "-" + only.substring(3,4);

		$("#buymthd").focus();

	// ── 박스 계산기 이벤트 위임 (계산기 파일 동일 로직) ──
	$(document).on("keyup change", ".rowbox-qty, .rowbox-per", function() {
		var id  = this.id;
		var idx = id.replace("qty_", "").replace("rowbox1_", "");
		var qty    = parseInt($("#qty_"     + idx).val())  || 0;
		var perInput = $("#rowbox1_" + idx);
		// 각BOX부수: 입력값 있으면 사용, 없으면 placeholder(=수량) 사용
		var perBox = parseInt(perInput.val()) || parseInt(perInput.attr("placeholder")) || 0;
		// 수량 변경 시 placeholder를 수량으로 갱신
		if (id.indexOf("qty_") === 0 && qty > 0) {
			perInput.attr("placeholder", qty);
			perBox = parseInt(perInput.val()) || qty;
		}
		if (qty > 0 && perBox > 0) {
			var full  = Math.floor(qty / perBox);
			var total = Math.ceil(qty / perBox);
			$("#rowbox2_"   + idx).val(full);
			$("#rowboxtot_" + idx).val(total);
		} else {
			$("#rowbox2_"   + idx).val("");
			$("#rowboxtot_" + idx).val("");
		}
	});
});
</script>

<script type="text/javascript">
var iBottomAlert 	= 0;
var iBottomAlertTot	= 0;
var iBottomTimer 	= 0;
var sHeaderbar 		= "";


function alert_admin_bottom(val) {
	var divhtml = "";
	var arr = new Array();

	if ($(".headerbar").length > 0) {//210302
		if (val.replace("@^@", "")) {
			arr = val.split("@^@");

			$(".headerbar").css({"position":"relative"});

			divhtml = '<div id="id_bottomalertlist_1" style="position:absolute;width:calc(100% - 200px);height:34px;top:3px;right:10px;z-index:100;">'
					+ arr[1]
					+ '</div>'
					+ '<div id="id_bottomalertlist_2" style="position:absolute;width:calc(100% - 240px);top:40px;right:10px;padding:5px 20px;background:#ddf2ff;z-index:200;display:none;">'
					+ arr[2]
					+ '</div>';

			iBottomAlertTot = Number(arr[0]);
			set_admin_bottom_start('0');
		}

		divhtml += sHeaderbar;
		$(".headerbar").html(divhtml);
	}
	arr = [];
}


function set_admin_bottom(sel, val) {
	if (sel == "oper") {
		var id = $("#id_icon_"+val+"_oper");
		if (id.html() == "▶") {
			set_admin_bottom_start(val);
			id.html('■');
		}
		else {
			set_admin_bottom_stop();
			id.html('▶');
		}
	}
	else if (sel == "disp") {
		var i = 0;
		var idcss = $("#id_bottomalertlist_2");
		if (idcss.css("display") == "none") {
			$("#id_bottomalertlist_2").show();
			for (i=0; i<iBottomAlertTot; i++) {
				$("#id_icon_"+i+"_disp").html('∧');
				$("#id_icon_"+i+"_disp").css({"padding":"0px","font-weight":"bold","font-size":"14px","color":"#ffffff","line-height":"34px"});
			}
		}
		else {
			$("#id_bottomalertlist_2").hide();
			for (i=0; i<iBottomAlertTot; i++) {
				$("#id_icon_"+i+"_disp").html('∨');
				$("#id_icon_"+i+"_disp").css({"padding":"0px","font-weight":"bold","font-size":"14px","color":"#ffffff","line-height":"34px"});

			}
		}
	}
	else if (sel == "page") {
		location.href = val+"&BtmAlert=Y"; //알림 바로 실행
	}
}


function set_admin_bottom_oper() {
	var i = 0;
	var mx = 0;
	for (i=0; i<100; i++) {
		if ($("#id_icon_"+i).length > 0) {
			$("#id_icon_"+i).hide();
		}
		else if (!mx) {
			mx = i;
		}
	}
	iBottomAlert++;
	if ($("#id_icon_"+iBottomAlert).length > 0) {
		$("#id_icon_"+iBottomAlert).show();
	}
	if (iBottomAlert == (mx - 1)) {
		iBottomAlert = -1;
	}
}

function set_admin_bottom_start(val) {
	iBottomAlert = Number(val);
	if (iBottomAlertTot > 1) {
		iBottomTimer = setInterval("set_admin_bottom_oper()", 1000*10); //이후 5초 ~
	}
}

function set_admin_bottom_stop() {
	clearInterval(iBottomTimer);
}


$(function() {
	if ($(".headerbar").length > 0 && !sHeaderbar) {
		sHeaderbar = $(".headerbar").html();
	}

	if ($("#iframe_exe").length > 0) {
	}
	else {//없으면.. 221102
		$("#id_iframeexetemp").html('<iframe id="iframe_exe" width="0" height="0" style="display:none;"></iframe>');
	}
});
</script>
