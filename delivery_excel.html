<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>택배 업로드용 발송목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --surface2: #EDEBE5;
    --border: #D8D4CA;
    --text: #1A1916;
    --text-sub: #7A776E;
    --text-hint: #B0ADA6;
    --accent: #2C4A3E;
    --accent-light: #E8F0EC;
    --accent-text: #1A3029;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem 4rem; }

  header {
    max-width: 1000px; margin: 0 auto 2rem;
    border-bottom: 1.5px solid var(--text);
    padding-bottom: 1rem;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; }
  header .meta { font-family: var(--mono); font-size: 11px; color: var(--text-sub); text-align: right; line-height: 1.8; }

  .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  .card-header {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
  }
  .card-header-left { display: flex; align-items: center; gap: 10px; }
  .step-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; background: var(--text); color: var(--surface); padding: 2px 7px; border-radius: 4px; }
  .card-header h2 { font-size: 13px; font-weight: 500; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; padding: 1.25rem; }
  .metric { background: var(--surface2); border-radius: 8px; padding: 0.8rem 1rem; }
  .metric-label { font-size: 11px; color: var(--text-sub); letter-spacing: 0.04em; font-family: var(--mono); margin-bottom: 5px; }
  .metric-value { font-size: 26px; font-weight: 700; color: var(--text); font-family: var(--mono); }
  .metric-unit { font-size: 12px; font-weight: 400; color: var(--text-sub); margin-left: 3px; }

  /* Controls */
  .controls { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .controls label { font-size: 13px; color: var(--text-sub); }
  .controls input[type=number] {
    width: 75px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--mono); font-size: 16px; font-weight: 500; text-align: center;
    background: var(--surface); color: var(--text); outline: none;
    -moz-appearance: textfield;
  }
  .controls input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .controls input[type=number]:focus { border-color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th {
    padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 500;
    color: var(--text-sub); letter-spacing: 0.05em; font-family: var(--mono); white-space: nowrap;
  }
  th.center, td.center { text-align: center; }
  th.right, td.right { text-align: right; }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F7F5F0; }
  tbody tr.group-start td { border-top: 1.5px solid var(--border); }
  td { padding: 9px 12px; color: var(--text); vertical-align: middle; }
  td.mono { font-family: var(--mono); font-size: 12.5px; }
  td.addr { font-size: 12px; color: var(--text-sub); line-height: 1.5; max-width: 300px; }
  .row-num { font-family: var(--mono); font-size: 11px; color: var(--text-hint); }
  .box-tag {
    display: inline-block; font-family: var(--mono); font-size: 11px; font-weight: 500;
    background: var(--accent-light); color: var(--accent-text);
    padding: 2px 8px; border-radius: 4px;
  }

  /* Buttons */
  .btn-row { padding: 1rem 1.25rem; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 7px; font-family: var(--sans);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .btn svg { flex-shrink: 0; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--surface2); }

  .notice { padding: 0 1.25rem 1rem; font-size: 11.5px; color: var(--text-hint); font-family: var(--mono); line-height: 1.8; }

  @media print {
    body { background: white; padding: 1rem; }
    .btn-row, .controls { display: none; }
    .card { border: 1px solid #ccc; }
  }
  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; }
    .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>저자 증정본 택배<br>발송목록 (택배사 업로드용)</h1>
  </div>
  <div class="meta" id="headerMeta"></div>
</header>

<div class="container">

  <!-- 요약 -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-left">
        <span class="step-badge">SUMMARY</span>
        <h2>발송 요약</h2>
      </div>
    </div>
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">수령인 수</div><div class="metric-value" id="s-recipients">4<span class="metric-unit">명</span></div></div>
      <div class="metric"><div class="metric-label">총 수량</div><div class="metric-value" id="s-copies">200<span class="metric-unit">부</span></div></div>
      <div class="metric"><div class="metric-label">총 박스</div><div class="metric-value" id="s-boxes">20<span class="metric-unit">박스</span></div></div>
      <div class="metric"><div class="metric-label">총 레코드(행)</div><div class="metric-value" id="s-rows">20<span class="metric-unit">행</span></div></div>
    </div>
  </div>

  <!-- 설정 + 테이블 -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-left">
        <span class="step-badge">TABLE</span>
        <h2>수령인별 발송 레코드 (박스 1개 = 1행)</h2>
      </div>
    </div>
    <div class="controls">
      <label>한 박스당 부수</label>
      <input type="number" id="perBox" min="1" value="10" oninput="rebuild()" />
      <span style="font-size:13px;color:var(--text-sub)">부 / 박스</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center">행</th>
            <th>수령인</th>
            <th>연락처</th>
            <th>주소</th>
            <th class="center">박스 번호</th>
            <th class="right">수량(부)</th>
            <th class="center">중량(kg)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV 내려받기
      </button>
      <button class="btn btn-secondary" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        인쇄 / PDF 저장
      </button>
    </div>
    <div class="notice">
      * CSV는 UTF-8 BOM 인코딩 저장 → 엑셀에서 바로 열기 가능<br>
      * 중량은 부수당 0.3kg 기준으로 자동 계산됩니다 (수정 가능)
    </div>
  </div>

</div>

<script>
const WEIGHT_PER_COPY = 0.3; // kg

const recipients = [
  { name: "박상철", phone: "010-5495-9200", qty: 20,  address: "경기도 성남시 분당구 공내로67번길 11 중앙하이츠빌리지 206동 101호" },
  { name: "이희원", phone: "010-3122-0337", qty: 150, address: "서울특별시 동대문구 이문로 120 이문 아이파크 자이 103동 210호" },
  { name: "강시철", phone: "010-3016-3601", qty: 10,  address: "서울특별시 강남구 세곡동 590, 301호" },
  { name: "임규성", phone: "010-5678-0654", qty: 20,  address: "경기도 용인시 수지구 성복1로107, 514동 702호 벽산첼시빌2차 아파트" },
];

function buildRows(perBox) {
  const rows = [];
  recipients.forEach(r => {
    const boxes = Math.ceil(r.qty / perBox);
    for (let b = 1; b <= boxes; b++) {
      const isLast = b === boxes;
      const copiesInBox = isLast ? (r.qty - perBox * (boxes - 1)) : perBox;
      rows.push({
        name: r.name,
        phone: r.phone,
        address: r.address,
        boxNum: b,
        totalBoxes: boxes,
        copies: copiesInBox,
        weight: Math.round(copiesInBox * WEIGHT_PER_COPY * 10) / 10,
        groupStart: b === 1,
      });
    }
  });
  return rows;
}

let globalRows = [];

function rebuild() {
  const perBox = Math.max(1, parseInt(document.getElementById('perBox').value) || 1);
  globalRows = buildRows(perBox);
  const tbody = document.getElementById('tbody');

  let totalBoxes = 0;
  let totalCopies = 0;
  recipients.forEach(r => { totalBoxes += Math.ceil(r.qty / perBox); totalCopies += r.qty; });

  tbody.innerHTML = globalRows.map((row, i) => `
    <tr class="${row.groupStart ? 'group-start' : ''}">
      <td class="center row-num">${i + 1}</td>
      <td style="font-weight:${row.groupStart ? '500' : '400'};white-space:nowrap">${row.name}</td>
      <td class="mono">${row.phone}</td>
      <td class="addr">${row.address}</td>
      <td class="center"><span class="box-tag">${row.boxNum} / ${row.totalBoxes}</span></td>
      <td class="right mono">${row.copies}</td>
      <td class="center mono">${row.weight}</td>
    </tr>
  `).join('');

  document.getElementById('s-recipients').innerHTML = `${recipients.length}<span class="metric-unit">명</span>`;
  document.getElementById('s-copies').innerHTML = `${totalCopies}<span class="metric-unit">부</span>`;
  document.getElementById('s-boxes').innerHTML = `${totalBoxes}<span class="metric-unit">박스</span>`;
  document.getElementById('s-rows').innerHTML = `${globalRows.length}<span class="metric-unit">행</span>`;
}

function exportCSV() {
  const header = ["순번","수령인","연락처","주소","박스번호","총박스","수량(부)","중량(kg)"];
  const rows = globalRows.map((r, i) => [
    i + 1, r.name, r.phone, r.address, r.boxNum, r.totalBoxes, r.copies, r.weight
  ]);
  const csv = "\uFEFF" + [header, ...rows].map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.download = `택배_업로드용_${today}.csv`;
  a.click();
}

// Init header
const d = new Date();
document.getElementById('headerMeta').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}\n발송 계획서`;

rebuild();
</script>
</body>
</html>
