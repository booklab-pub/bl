<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>표지·판권 면 대조 검수</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f4f3ef; color: #1a1a1a; min-height: 100vh; font-size: 14px; }

.header { background: #1a1a1a; color: #fff; padding: 18px 32px; display: flex; align-items: baseline; gap: 16px; }
.header h1 { font-size: 17px; font-weight: 500; }
.header .sub { font-size: 12px; color: #888; }

.wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

/* 업로드 2열 */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.upload-card { background: #fff; border-radius: 10px; border: 0.5px solid #e0ddd6; overflow: hidden; }
.card-head { padding: 12px 16px; border-bottom: 0.5px solid #eee; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: .3px; }
.card-head .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.badge-cover { background: #e8f0fe; color: #1a56db; }
.badge-body  { background: #e8f7ee; color: #1a7a4a; }

.drop-zone { margin: 16px; border: 1.5px dashed #d0cdc5; border-radius: 8px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all .15s; }
.drop-zone:hover, .drop-zone.drag { border-color: #888; background: #faf9f7; }
.drop-zone .ico { font-size: 26px; margin-bottom: 8px; }
.drop-zone p { font-size: 13px; color: #777; line-height: 1.6; }
.drop-zone p strong { color: #1a1a1a; }
.drop-zone.loaded { border-color: #3a9a5c; background: #f0faf4; }
.drop-zone.loaded p { color: #1a7a4a; }
input[type=file] { display: none; }

/* 분석 버튼 */
.btn-row { text-align: center; margin-bottom: 28px; }
.btn-analyze { padding: 11px 36px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.btn-analyze:hover { background: #333; }
.btn-analyze:disabled { opacity: .4; cursor: not-allowed; }

/* 진행 바 */
.progress-wrap { margin-bottom: 20px; display: none; }
.progress-bar { height: 3px; background: #e8e6e0; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a1a1a; border-radius: 99px; transition: width .3s; }
.progress-label { font-size: 12px; color: #888; margin-top: 6px; text-align: center; }

/* 결과 패널 */
.result-panel { background: #fff; border-radius: 10px; border: 0.5px solid #e0ddd6; overflow: hidden; display: none; }
.result-head { padding: 14px 20px; border-bottom: 0.5px solid #eee; display: flex; align-items: center; gap: 12px; }
.result-head h2 { font-size: 14px; font-weight: 500; }
.overall-badge { font-size: 12px; padding: 3px 10px; border-radius: 5px; font-weight: 500; }
.ok-all  { background: #e8f7ee; color: #1a7a4a; }
.has-err { background: #fdecea; color: #c0392b; }
.has-warn{ background: #fff8e1; color: #b45309; }

/* 체크 항목 테이블 */
.check-table { width: 100%; border-collapse: collapse; }
.check-table th { padding: 10px 20px; text-align: left; font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: .3px; background: #faf9f7; border-bottom: 0.5px solid #eee; }
.check-table td { padding: 13px 20px; vertical-align: top; border-bottom: 0.5px solid #f5f4f0; font-size: 13px; }
.check-table tr:last-child td { border-bottom: none; }
.check-table td.label { font-weight: 500; color: #444; width: 130px; white-space: nowrap; }
.check-table td.val { color: #1a1a1a; width: 35%; word-break: break-all; }
.check-table td.val .missing { color: #bbb; font-style: italic; }
.check-table td.val .raw { font-size: 11px; color: #999; margin-top: 3px; }
.check-table td.status { width: 100px; }
.check-table td.note { color: #666; font-size: 12px; }

.tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 5px; font-size: 12px; font-weight: 500; }
.tag-ok   { background: #e8f7ee; color: #1a7a4a; }
.tag-err  { background: #fdecea; color: #c0392b; }
.tag-warn { background: #fff8e1; color: #b45309; }
.tag-info { background: #e8f0fe; color: #1a56db; }
.tag::before { font-size: 11px; }
.tag-ok::before   { content: '✓'; }
.tag-err::before  { content: '✗'; }
.tag-warn::before { content: '△'; }
.tag-info::before { content: '―'; }

/* 미리보기 2열 */
.preview-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 0; margin-top: 20px; }
.preview-card { border-top: 0.5px solid #eee; }
.preview-card-head { padding: 8px 20px; font-size: 11px; font-weight: 500; color: #888; background: #faf9f7; letter-spacing: .2px; text-transform: uppercase; }
.preview-card.span-col { grid-column: 1 / 2; }
.preview-card.body-card { grid-column: 2 / 3; grid-row: 1 / 3; border-left: 0.5px solid #eee; }
.preview-canvas-wrap { padding: 12px 16px; background: #e8e6e0; text-align: center; }
.preview-canvas-wrap canvas { max-width: 100%; border-radius: 3px; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #555; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div class="header">
  <h1>표지 · 판권 면 대조 검수</h1>
  <span class="sub">표지 PDF와 본문 PDF를 업로드하면 주요 항목을 자동으로 대조합니다</span>
</div>

<div class="wrap">
  <div class="upload-grid">
    <!-- 표지 -->
    <div class="upload-card">
      <div class="card-head">
        <span class="badge badge-cover">표지</span> 표지 PDF
      </div>
      <div class="drop-zone" id="dz-cover" onclick="document.getElementById('fi-cover').click()">
        <div class="ico">🖼</div>
        <p><strong>표지 PDF</strong>를 드래그하거나<br>클릭하여 업로드</p>
      </div>
      <input type="file" id="fi-cover" accept=".pdf">
    </div>
    <!-- 본문 -->
    <div class="upload-card">
      <div class="card-head">
        <span class="badge badge-body">본문</span> 본문 PDF
      </div>
      <div class="drop-zone" id="dz-body" onclick="document.getElementById('fi-body').click()">
        <div class="ico">📄</div>
        <p><strong>본문 PDF</strong>를 드래그하거나<br>클릭하여 업로드</p>
      </div>
      <input type="file" id="fi-body" accept=".pdf">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-analyze" id="btn-analyze" disabled>대조 검수 시작</button>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">분석 중...</div>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-head">
      <h2>대조 결과</h2>
      <span class="overall-badge" id="overall-badge"></span>
    </div>
    <table class="check-table">
      <thead>
        <tr>
          <th>항목</th>
          <th>표지</th>
          <th>판권 면</th>
          <th>결과</th>
          <th>비고</th>
        </tr>
      </thead>
      <tbody id="result-tbody"></tbody>
    </table>

    <div class="preview-grid">
      <div class="preview-card span-col">
        <div class="preview-card-head">표1 — 앞표지</div>
        <div class="preview-canvas-wrap" id="cover1-preview"></div>
      </div>
      <div class="preview-card body-card">
        <div class="preview-card-head">판권 면</div>
        <div class="preview-canvas-wrap" id="body-preview"></div>
      </div>
      <div class="preview-card span-col">
        <div class="preview-card-head">표4 — 뒤표지</div>
        <div class="preview-canvas-wrap" id="cover4-preview"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

let coverFile = null, bodyFile = null;
let coverDoc = null, bodyDoc = null;

// ── 드래그 앤 드롭 ──
function setupDrop(dzId, inputId, onLoad) {
  const dz = document.getElementById(dzId);
  const fi = document.getElementById(inputId);
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') onLoad(f, dz);
  });
  fi.addEventListener('change', e => {
    if (e.target.files[0]) onLoad(e.target.files[0], dz);
  });
}

setupDrop('dz-cover', 'fi-cover', (f, dz) => {
  coverFile = f;
  dz.classList.add('loaded');
  dz.querySelector('p').innerHTML = `<strong>${f.name}</strong><br>업로드 완료`;
  checkReady();
});
setupDrop('dz-body', 'fi-body', (f, dz) => {
  bodyFile = f;
  dz.classList.add('loaded');
  dz.querySelector('p').innerHTML = `<strong>${f.name}</strong><br>업로드 완료`;
  checkReady();
});

function checkReady() {
  document.getElementById('btn-analyze').disabled = !(coverFile && bodyFile);
}
document.getElementById('btn-analyze').addEventListener('click', runAnalysis);

// ── 진행 표시 ──
function setProgress(pct, label) {
  const pw = document.getElementById('progress-wrap');
  pw.style.display = 'block';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
  if (pct >= 100) setTimeout(() => pw.style.display = 'none', 500);
}

// ── PDF 텍스트 아이템 추출 (공통) ──
async function getPageItems(pdfDoc, pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const content = await page.getTextContent();
  const vp = page.getViewport({ scale: 1 });
  const items = content.items
    .filter(i => i.str && i.str.trim())
    .map(i => ({
      text: i.str.trim(),
      x: i.transform[4],
      y: i.transform[5],       // PDF 좌표: 아래=0, 위=최대
      screenY: vp.height - i.transform[5],
      size: i.height || i.transform[0],
    }));
  return { items, page, vp };
}

// ── 표지 파싱 ──
// 표1(앞표지): 큰 제목 + 저자   표4(뒤표지): 정가 + ISBN
// 감지 전략:
//   ① 책등: 1글자 세로쓰기 컬럼 자동 감지
//   ② 표4: '값 ' / 'book.co.kr' 등 북랩 표4 고유 텍스트의 x 위치 → 책등 왼/오른쪽 판별
//   ③ 표1: 책등 반대편 전체
async function parseCover(doc) {
  const { items, page, vp } = await getPageItems(doc, 1);
  const pw = vp.width, ph = vp.height;
  const isSpread = pw > ph * 1.3;

  let title = '', author = '', isbn = null, price = '';

  if (isSpread) {
    // ① 책등 자동 감지
    const xBuckets = {};
    for (const it of items) {
      if ([...it.text].length === 1) {
        const key = Math.round(it.x / 12) * 12;
        if (!xBuckets[key]) xBuckets[key] = [];
        xBuckets[key].push(it);
      }
    }
    let spineMin = pw, spineMax = 0;
    for (const g of Object.values(xBuckets)) {
      if (g.length >= 4) {
        spineMin = Math.min(spineMin, ...g.map(i => i.x));
        spineMax = Math.max(spineMax, ...g.map(i => i.x + 12));
      }
    }
    if (spineMax <= spineMin) { spineMin = pw * 0.47; spineMax = pw * 0.52; }

    // ② 표4 위치 감지: 북랩 표4 고유 텍스트로 책등 어느쪽인지 판별
    const back4Markers = ['값 ', '00,000원', 'book.co.kr', 'www.book.co.kr'];
    const marker = items.find(it => back4Markers.some(m => it.text.includes(m)));
    const back4IsLeft = marker ? marker.x < spineMin : true; // 없으면 왼쪽 기본

    // ③ 구역 확정
    const back4X0 = back4IsLeft ? 0        : spineMax;
    const back4X1 = back4IsLeft ? spineMin : pw;
    const cov1X0  = back4IsLeft ? spineMax : 0;
    const cov1X1  = back4IsLeft ? pw       : spineMin;

    const back4Items = items.filter(i => i.x >= back4X0 && i.x < back4X1);
    const cov1Items  = items.filter(i => i.x >= cov1X0  && i.x < cov1X1);
    const spineItems = items.filter(i => i.x >= spineMin && i.x < spineMax);

    // ── 표1: 제목 (최대 폰트 기준) ──
    const maxSz = Math.max(...cov1Items.map(i => i.size), 0);
    const titleCands = cov1Items.filter(i => i.size >= maxSz * 0.55);
    titleCands.sort((a, b) => b.y - a.y);
    title = groupByY(titleCands, 8)
      .map(line => line.sort((a, b) => a.x - b.x).map(i => i.text).join(''))
      .join(' ').replace(/\s+/g, ' ').trim();

    // ── 표1: 저자 ('지음' 인근 → 책등 보완) ──
    const jieum = cov1Items.find(i => i.text.trim() === '지음');
    if (jieum) {
      const near = cov1Items.filter(i =>
        i !== jieum && Math.abs(i.y - jieum.y) < 25 &&
        !['지음', '지 음'].includes(i.text.trim())
      );
      author = near.sort((a, b) => a.x - b.x).map(i => i.text).join('').replace('지음', '').trim();
    }
    if (!author) author = groupSpineByCol(spineItems).author || '';

    // ── 표4: 정가 ──
    const priceRe = /(\d{2,3},\d{3})\s*원/;
    const priceIt = back4Items.find(i => priceRe.test(i.text));
    if (priceIt) price = priceIt.text.replace(/^값\s*/, '').trim();
    else {
      const ph2 = back4Items.find(i => /\d{2},\d{3}원/.test(i.text));
      if (ph2) price = ph2.text.replace(/^값\s*/, '').trim();
    }

    // ── 표4: ISBN (텍스트 레이어 있을 경우) ──
    const ISBN_RE = /979-\d{2}-\d{4}-\d{3}-\d|978-\d{2}-\d{4}-\d{3}-\d/;
    for (const it of [...back4Items, ...items]) {
      const m = it.text.match(ISBN_RE);
      if (m) { isbn = m[0]; break; }
    }

  } else {
    // 단면 표지
    const maxSz = Math.max(...items.map(i => i.size), 0);
    title = groupByY(items.filter(i => i.size >= maxSz * 0.6).sort((a,b)=>b.y-a.y), 8)
      .map(l => l.sort((a,b)=>a.x-b.x).map(i=>i.text).join('')).join(' ').trim();
    const jieum = items.find(i => i.text.trim() === '지음');
    if (jieum) author = items
      .filter(i => i !== jieum && Math.abs(i.y-jieum.y) < 25 && i.text.trim() !== '지음')
      .sort((a,b)=>a.x-b.x).map(i=>i.text).join('').trim();
    const priceRe = /(\d{2,3},\d{3})\s*원/;
    const pi = items.find(i => priceRe.test(i.text) && !i.text.includes('|'));
    if (pi) price = pi.text.replace(/^값\s*/, '').trim();
    const ISBN_RE = /979-\d{2}-\d{4}-\d{3}-\d|978-\d{2}-\d{4}-\d{3}-\d/;
    for (const it of items) { const m = it.text.match(ISBN_RE); if (m) { isbn = m[0]; break; } }
  }

  return { title, author, isbn, price };
}


// 책등 세로쓰기: x컬럼 기준으로 폰트 크기별 글자 합치기
function groupSpineByCol(spineItems) {
  if (!spineItems.length) return {};
  // x 기준 컬럼 그룹 (±8pt)
  const cols = {};
  for (const it of spineItems) {
    const key = Math.round(it.x / 8) * 8;
    if (!cols[key]) cols[key] = [];
    cols[key].push(it);
  }

  let title = '', author = '';
  for (const col of Object.values(cols)) {
    col.sort((a,b) => a.screenY - b.screenY);  // 위→아래
    // 폰트 크기별 그룹
    const sizeGroups = {};
    for (const it of col) {
      const key = Math.round(it.size * 2) / 2;
      if (!sizeGroups[key]) sizeGroups[key] = [];
      sizeGroups[key].push(it.text);
    }
    const sorted = Object.entries(sizeGroups).sort((a,b) => b[0]-a[0]);
    // 가장 큰 폰트 → 제목
    if (sorted[0] && !title) title = sorted[0][1].join('');
    // 두 번째로 큰 폰트 (단, '지음' 제외) → 저자
    for (const [, txts] of sorted.slice(1)) {
      const joined = txts.join('').replace('지음','').trim();
      if (joined && !author) { author = joined; break; }
    }
  }
  return { title, author };
}

// ── 판권 면 파싱 ──
async function parseCopyright(doc) {
  const total = doc.numPages;
  // 앞 5 + 뒤 20 페이지 검색
  const searchRange = new Set([
    ...Array.from({length: Math.min(5,total)}, (_,i) => i+1),
    ...Array.from({length: Math.min(20,total)}, (_,i) => total-i),
  ]);
  const REQUIRED = ['발행일','지은이','펴낸이','펴낸곳','출판등록','ISBN'];

  let bestPage = null, bestText = '';
  for (const pn of [...searchRange].sort((a,b)=>a-b)) {
    const { items } = await getPageItems(doc, pn);
    const text = items.map(i => i.text).join(' ');
    if (REQUIRED.every(f => text.includes(f))) {
      bestPage = pn; bestText = text; break;
    }
  }
  if (!bestPage) return null;

  const { items, page, vp } = await getPageItems(doc, bestPage);
  const pw = vp.width;
  const isSpread = pw > vp.height * 1.3;
  const rightBound = isSpread ? pw / 2 : pw;
  const leftItems = items.filter(i => i.x < rightBound);
  const text = leftItems.map(i => i.text).join(' ');

  // ── 제목: 판권 면 실선 위의 텍스트 ──
  // 판권 면 구조: [도서 제목] ─────실선───── [발행일·지은이·...]
  // 전략: 가로 실선(획)의 y 좌표를 찾아, 그 위에 있는 텍스트만 제목으로 추출
  // 실선이 없으면 최상단 텍스트 1행을 제목으로 사용
  // 제목: 첫 번째 큰 gap(>12pt) 위 텍스트 = 실선 위 도서명
  let title = '';
  {
    const sorted = [...leftItems].sort((a, b) => a.screenY - b.screenY);
    if (sorted.length > 0) {
      let cutY = null;
      for (let i = 1; i < sorted.length; i++) {
        const gap = sorted[i].screenY - sorted[i-1].screenY;
        if (gap > 12) { cutY = sorted[i-1].screenY + gap / 2; break; }
      }
      const titleItems = cutY !== null
        ? sorted.filter(i => i.screenY <= cutY)
        : [sorted[0]];
      title = groupByY(titleItems, 6)
        .map(line => line.sort((a,b) => a.x - b.x).map(i => i.text).join(''))
        .join(' ').replace(/\s+/g, ' ').trim();
    }
  }

  // 저자: '지은이' 레이블 오른쪽 값
  const author = extractLabelValue(leftItems, '지은이');

  // ISBN (종이책)
  const ISBN_RE = /979-\d{2}-\d{4}-\d{3}-\d|978-\d{2}-\d{4}-\d{3}-\d/g;
  const isbns = [];
  for (const i of leftItems) {
    let m;
    while ((m = ISBN_RE.exec(i.text)) !== null) isbns.push(m[0]);
  }
  const isbn = isbns.find(s => {
    // 뒤따르는 텍스트에 (종이책)이 있으면 우선
    const idx = leftItems.findIndex(i => i.text.includes(s));
    const nearby = leftItems.slice(idx, idx+3).map(i=>i.text).join(' ');
    return nearby.includes('종이책');
  }) || isbns[0] || null;

  // 정가: 판권에는 보통 없음 → null
  const price = null;

  return { title, author, isbn, price, pageNum: bestPage, page, vp };
}

// ── 공통 유틸 ──
function groupByY(items, tolerance = 5) {
  if (!items.length) return [];
  const lines = [[items[0]]];
  for (let i = 1; i < items.length; i++) {
    const lastGroup = lines[lines.length - 1];
    const refY = lastGroup[0].y;
    if (Math.abs(items[i].y - refY) <= tolerance) lastGroup.push(items[i]);
    else lines.push([items[i]]);
  }
  return lines;
}

function extractLabelValue(items, label) {
  const lbl = items.find(i => i.text.trim() === label || i.text.startsWith(label));
  if (!lbl) return '';
  const same = items.filter(i =>
    Math.abs(i.screenY - lbl.screenY) < 8 && i.x > lbl.x + 5
  );
  if (same.length) return same.sort((a,b)=>a.x-b.x).map(i=>i.text).join('').trim();
  // 바로 다음 y 라인
  const nextLine = items.filter(i =>
    i.screenY > lbl.screenY + 2 && i.screenY < lbl.screenY + 20
  );
  return nextLine.sort((a,b)=>a.x-b.x).map(i=>i.text).join('').trim();
}

function normalize(s) {
  if (!s) return '';
  return s.replace(/\s+/g, '').replace(/[　 ]/g, '').toLowerCase()
          .replace(/（/g,'(').replace(/）/g,')');
}

function compareVal(a, b) {
  if (!a && !b) return 'info';
  if (!a || !b) return 'warn';
  if (normalize(a) === normalize(b)) return 'ok';
  // ISBN: 하이픈 제거 비교
  if (a.replace(/-/g,'') === b.replace(/-/g,'')) return 'ok';
  return 'err';
}

// ── 페이지 렌더 ──
async function renderCropCanvas(page, vp, x0, y0, x1, y1, container) {
  const scale = Math.min(460 / (x1 - x0), 600 / (y1 - y0), 2.0);
  const cropVp = page.getViewport({ scale, offsetX: -x0 * scale, offsetY: -y0 * scale });
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round((x1 - x0) * scale);
  canvas.height = Math.round((y1 - y0) * scale);
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.rect(0, 0, canvas.width, canvas.height); ctx.clip();
  await page.render({ canvasContext: ctx, viewport: cropVp }).promise;
  ctx.restore();
  container.innerHTML = '';
  container.appendChild(canvas);
}

async function renderPageToCanvas(page, vp, isSpread, container) {
  const scale = Math.min(500 / (isSpread ? vp.width/2 : vp.width), 1.5);
  const rightBound = isSpread ? vp.width / 2 : vp.width;
  const cropVp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(rightBound * scale);
  canvas.height = Math.round(vp.height * scale);
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.rect(0, 0, canvas.width, canvas.height); ctx.clip();
  await page.render({ canvasContext: ctx, viewport: cropVp }).promise;
  ctx.restore();
  container.innerHTML = '';
  container.appendChild(canvas);
}

// ── 메인 분석 ──
async function runAnalysis() {
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;

  setProgress(5, '표지 PDF 불러오는 중...');
  const coverBuf = await coverFile.arrayBuffer();
  coverDoc = await pdfjsLib.getDocument({ data: coverBuf }).promise;

  setProgress(20, '본문 PDF 불러오는 중...');
  const bodyBuf = await bodyFile.arrayBuffer();
  bodyDoc = await pdfjsLib.getDocument({ data: bodyBuf }).promise;

  setProgress(40, '표지 분석 중...');
  const coverData = await parseCover(coverDoc);

  setProgress(65, '판권 면 탐색 중...');
  const bodyData = await parseCopyright(bodyDoc);

  setProgress(85, '미리보기 렌더링 중...');

  // 표지 미리보기 (표1, 표4 분리 렌더)
  const cvPage = await coverDoc.getPage(1);
  const cvVp = cvPage.getViewport({ scale: 1 });
  const cvSpread = cvVp.width > cvVp.height * 1.3;
  const cvItems = (await getPageItems(coverDoc, 1)).items;

  if (cvSpread) {
    // 책등 위치 재계산
    const xBk = {};
    for (const it of cvItems) {
      if ([...it.text].length === 1) {
        const k = Math.round(it.x/12)*12;
        if (!xBk[k]) xBk[k] = [];
        xBk[k].push(it);
      }
    }
    let sm = cvVp.width, sx = 0;
    for (const g of Object.values(xBk)) {
      if (g.length >= 4) { sm = Math.min(sm,...g.map(i=>i.x)); sx = Math.max(sx,...g.map(i=>i.x+12)); }
    }
    if (sx <= sm) { sm = cvVp.width*0.47; sx = cvVp.width*0.52; }

    // 표4 방향
    const markers = ['값 ','00,000원','book.co.kr'];
    const mk = cvItems.find(it => markers.some(m=>it.text.includes(m)));
    const b4Left = mk ? mk.x < sm : true;
    const c1x0 = b4Left ? sx : 0;
    const c1x1 = b4Left ? cvVp.width : sm;
    const c4x0 = b4Left ? 0 : sx;
    const c4x1 = b4Left ? sm : cvVp.width;

    await renderCropCanvas(cvPage, cvVp, c1x0, 0, c1x1, cvVp.height, document.getElementById('cover1-preview'));
    await renderCropCanvas(cvPage, cvVp, c4x0, 0, c4x1, cvVp.height, document.getElementById('cover4-preview'));
  } else {
    await renderPageToCanvas(cvPage, cvVp, false, document.getElementById('cover1-preview'));
    document.getElementById('cover4-preview').innerHTML = '<p style="padding:16px;color:#999;font-size:12px;">단면 표지</p>';
  }

  // 판권 면 미리보기
  if (bodyData) {
    const isSpread = bodyData.vp.width > bodyData.vp.height * 1.3;
    await renderPageToCanvas(bodyData.page, bodyData.vp, isSpread, document.getElementById('body-preview'));
  }

  setProgress(100, '완료');
  renderResult(coverData, bodyData);
  btn.disabled = false;
}

// ── 결과 렌더 ──
function renderResult(cv, bd) {
  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const rows = [
    {
      label: '도서 제목',
      cvVal: cv.title,
      bdVal: bd ? bd.title : null,
      note: '',
    },
    {
      label: '저자',
      cvVal: cv.author,
      bdVal: bd ? bd.author : null,
      note: '',
    },
    {
      label: 'ISBN (종이책)',
      cvVal: cv.isbn,
      bdVal: bd ? bd.isbn : null,
      note: cv.isbn === null ? '표지 바코드가 이미지 형식 — 텍스트 추출 불가' : '',
    },
    {
      label: '정가',
      cvVal: cv.price,
      bdVal: bd ? bd.price : null,
      note: '판권 면에는 정가 미기재 (표지 단독 확인)',
    },
  ];

  let errCnt = 0, warnCnt = 0;
  const tbody = document.getElementById('result-tbody');
  tbody.innerHTML = '';

  rows.forEach(row => {
    const status = compareVal(row.cvVal, row.bdVal);
    if (status === 'err') errCnt++;
    if (status === 'warn') warnCnt++;

    const tagMap = {
      ok:   '<span class="tag tag-ok">일치</span>',
      err:  '<span class="tag tag-err">불일치</span>',
      warn: '<span class="tag tag-warn">미확인</span>',
      info: '<span class="tag tag-info">해당없음</span>',
    };

    const fmtVal = v => v
      ? `<span>${escHtml(v)}</span>`
      : `<span class="missing">추출 불가</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="label">${row.label}</td>
      <td class="val">${fmtVal(row.cvVal)}</td>
      <td class="val">${fmtVal(row.bdVal)}</td>
      <td class="status">${tagMap[status]}</td>
      <td class="note">${row.note}</td>`;
    tbody.appendChild(tr);
  });

  // 전체 결과 배지
  const badge = document.getElementById('overall-badge');
  if (errCnt > 0) {
    badge.textContent = `불일치 ${errCnt}건`; badge.className = 'overall-badge has-err';
  } else if (warnCnt > 0) {
    badge.textContent = `미확인 ${warnCnt}건`; badge.className = 'overall-badge has-warn';
  } else {
    badge.textContent = '전 항목 일치'; badge.className = 'overall-badge ok-all';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
