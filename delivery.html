<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<style id="webmakerstyle">

</style>
</head>
<body>
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>저자 증정본 택배 발송 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --surface2: #EDEBE5;
    --border: #D8D4CA;
    --text: #1A1916;
    --text-sub: #7A776E;
    --text-hint: #B0ADA6;
    --accent: #2C4A3E;
    --accent-light: #E8F0EC;
    --accent-text: #1A3029;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }

  header {
    max-width: 860px;
    margin: 0 auto 2.5rem;
    border-bottom: 1.5px solid var(--text);
    padding-bottom: 1.25rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  header p {
    font-size: 12px;
    color: var(--text-sub);
    font-family: var(--mono);
    text-align: right;
    line-height: 1.7;
  }

  .container { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.65rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .step-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    background: var(--text);
    color: var(--surface);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.03em;
  }

  .card-header h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .card-body { padding: 1.25rem; }

  /* Step 1 */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .setting-row label {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    min-width: 180px;
  }

  .input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-wrap input[type=number] {
    width: 90px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface);
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .input-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .input-wrap input[type=number]:focus { border-color: var(--accent); }

  .input-wrap .unit {
    font-size: 13px;
    color: var(--text-sub);
  }

  /* Step 2 Table */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 9px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.06em;
    font-family: var(--mono);
    white-space: nowrap;
  }

  th.right, td.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F7F5F0; }

  td {
    padding: 12px 14px;
    vertical-align: top;
    color: var(--text);
  }

  td .name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  td .address { font-size: 12px; color: var(--text-sub); line-height: 1.5; }
  td .phone { font-family: var(--mono); font-size: 12.5px; color: var(--text-sub); }

  .box-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent-text);
    padding: 4px 10px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .qty-num {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
  }

  /* Step 3 summary */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .metric {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.9rem 1rem;
  }

  .metric-label {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .metric-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--mono);
    letter-spacing: -0.02em;
  }

  .metric-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-sub);
    margin-left: 4px;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    border: 1px solid transparent;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: var(--surface2); }

  /* Flow */
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
  }

  .flow-step {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--surface2);
    border-radius: 7px;
    font-size: 13px;
    flex-shrink: 0;
  }

  .flow-step .n {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    color: var(--surface);
    font-size: 10px;
    font-weight: 700;
    font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .flow-step.done .n { background: var(--accent); }
  .flow-step.done { background: var(--accent-light); color: var(--accent-text); }

  .flow-arrow {
    padding: 0 6px;
    color: var(--text-hint);
    font-size: 16px;
    flex-shrink: 0;
  }

  /* notice */
  .notice {
    font-size: 12px;
    color: var(--text-hint);
    margin-top: 10px;
    font-family: var(--mono);
    line-height: 1.7;
  }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; }
    header p { text-align: left; }
    .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .flow { flex-direction: column; align-items: flex-start; }
    .flow-arrow { transform: rotate(90deg); padding: 2px 0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>저자 증정본<br>택배 발송 계산기</h1>
  </div>
  <p id="today-date"></p>
</header>

<div class="container">

  <!-- Step 1 -->
  <div class="card">
    <div class="card-header">
      <span class="step-badge">STEP 01</span>
      <h2>박스 설정</h2>
    </div>
    <div class="card-body">
      <div class="setting-row">
        <label>한 박스에 들어가는 부수</label>
        <div class="input-wrap">
          <input type="number" id="perBox" min="1" value="10" oninput="recalc()" />
          <span class="unit">부 / 박스</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <div class="card-header">
      <span class="step-badge">STEP 02</span>
      <h2>수령인별 박스 계산</h2>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>수령인 / 주소</th>
              <th>연락처</th>
              <th class="right">수량(부)</th>
              <th class="right">필요 박스</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="card">
    <div class="card-header">
      <span class="step-badge">STEP 03</span>
      <h2>요약 및 내보내기</h2>
    </div>
    <div class="card-body">
      <div class="summary-grid">
        <div class="metric">
          <div class="metric-label">총 수령인</div>
          <div class="metric-value" id="sumRecipients">0<span class="metric-unit">명</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">총 수량</div>
          <div class="metric-value" id="sumCopies">0<span class="metric-unit">부</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">총 박스 수</div>
          <div class="metric-value" id="sumBoxes">0<span class="metric-unit">박스</span></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportCSV()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV 내려받기 (택배사 업로드용)
        </button>
        <button class="btn btn-secondary" onclick="window.print()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          인쇄 / PDF 저장
        </button>
      </div>
      <p class="notice">* CSV 파일은 UTF-8 BOM 인코딩으로 저장됩니다. 엑셀에서 바로 열 수 있습니다.</p>
    </div>
  </div>

  <!-- Process flow -->
  <div class="card">
    <div class="card-header">
      <span class="step-badge">FLOW</span>
      <h2>전체 프로세스</h2>
    </div>
    <div class="card-body">
      <div class="flow">
        <div class="flow-step done"><span class="n">1</span> 부수 설정</div>
        <span class="flow-arrow">→</span>
        <div class="flow-step done"><span class="n">2</span> 박스 자동 계산</div>
        <span class="flow-arrow">→</span>
        <div class="flow-step done"><span class="n">3</span> CSV 내려받기</div>
        <span class="flow-arrow">→</span>
        <div class="flow-step"><span class="n">4</span> 택배사 사이트 업로드</div>
      </div>
    </div>
  </div>

</div>

<script>
const recipients = [
  { name: "박상철", phone: "010-5495-9200", qty: 20,  address: "경기도 성남시 분당구 공내로67번길 11 중앙하이츠빌리지 206동 101호" },
  { name: "이희원", phone: "010-3122-0337", qty: 150, address: "서울특별시 동대문구 이문로 120 이문 아이파크 자이 103동 210호" },
  { name: "강시철", phone: "010-3016-3601", qty: 10,  address: "서울특별시 강남구 세곡동 590, 301호" },
  { name: "임규성", phone: "010-5678-0654", qty: 20,  address: "경기도 동인시 수지구 성복1로107, 514동 702호 벽산첼시빌2차 아파트" },
];

function recalc() {
  const perBox = Math.max(1, parseInt(document.getElementById('perBox').value) || 1);
  const tbody = document.getElementById('tableBody');
  let totalCopies = 0, totalBoxes = 0;

  tbody.innerHTML = recipients.map(r => {
    const boxes = Math.ceil(r.qty / perBox);
    totalCopies += r.qty;
    totalBoxes += boxes;
    return `<tr>
      <td>
        <div class="name">${r.name}</div>
        <div class="address">${r.address}</div>
      </td>
      <td><span class="phone">${r.phone}</span></td>
      <td class="right"><span class="qty-num">${r.qty}</span></td>
      <td class="right"><span class="box-badge">${boxes} 박스</span></td>
    </tr>`;
  }).join('');

  document.getElementById('sumRecipients').innerHTML = `${recipients.length}<span class="metric-unit">명</span>`;
  document.getElementById('sumCopies').innerHTML = `${totalCopies}<span class="metric-unit">부</span>`;
  document.getElementById('sumBoxes').innerHTML = `${totalBoxes}<span class="metric-unit">박스</span>`;
}

function exportCSV() {
  const perBox = Math.max(1, parseInt(document.getElementById('perBox').value) || 1);
  const rows = [["수령인", "연락처", "주소", "수량(부)", "박스수"]];
  recipients.forEach(r => {
    rows.push([r.name, r.phone, r.address, r.qty, Math.ceil(r.qty / perBox)]);
  });
  const csv = "\uFEFF" + rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.download = `택배_발송목록_${today}.csv`;
  a.click();
}

// Today's date
const d = new Date();
document.getElementById('today-date').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}\n발송 계획서`;

recalc();
</script>
</body>
</html>
