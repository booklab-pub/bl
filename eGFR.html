<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eGFR 신장 기능 변화 추세 보고서</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }
        .description {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
        input[type="date"], input[type="number"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-container {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .prediction-item {
            margin: 10px 0;
            padding: 10px;
            border-left: 5px solid var(--secondary-color);
            background: #fff;
        }
        canvas {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>eGFR 신장 기능 변화 추세 보고서</h1>
    <p class="description">날짜와 eGFR 수치를 입력하시면 향후 변화 추세를 분석해 드립니다. (최대 20개)</p>

    <table id="inputTable">
        <thead>
            <tr>
                <th>번호</th>
                <th>날짜</th>
                <th>eGFR 수치</th>
            </tr>
        </thead>
        <tbody>
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`
                        <tr>
                            <td>${i}</td>
                            <td><input type="date" class="date-input"></td>
                            <td><input type="number" class="val-input" placeholder="0-120"></td>
                        </tr>
                    `);
                }
            </script>
        </tbody>
    </table>

    <div class="btn-container">
        <button onclick="analyzeData()">결과 분석 및 그래프 보기</button>
    </div>

    <div id="resultArea" class="result-section" style="display:none;">
        <h3>분석 결과 요약</h3>
        <div id="summary"></div>
        <div id="predictions"></div>
        <canvas id="trendChart" width="400" height="250"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    function analyzeData() {
        const dates = document.querySelectorAll('.date-input');
        const values = document.querySelectorAll('.val-input');
        
        let dataPoints = [];
        for (let i = 0; i < 20; i++) {
            if (dates[i].value && values[i].value) {
                dataPoints.push({
                    x: new Date(dates[i].value),
                    y: parseFloat(values[i].value)
                });
            }
        }

        if (dataPoints.length < 2) {
            alert("최소 2개 이상의 데이터를 입력해 주세요.");
            return;
        }

        // 날짜순 정렬
        dataPoints.sort((a, b) => a.x - b.x);

        // 선형 회귀 계산 (y = ax + b)
        const xValues = dataPoints.map(p => p.x.getTime());
        const yValues = dataPoints.map(p => p.y);
        
        const n = dataPoints.length;
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        for (let i = 0; i < n; i++) {
            sumX += xValues[i];
            sumY += yValues[i];
            sumXY += xValues[i] * yValues[i];
            sumXX += xValues[i] * xValues[i];
        }

        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;

        // 결과 표시
        document.getElementById('resultArea').style.display = 'block';
        const lastVal = dataPoints[dataPoints.length - 1].y;
        const slopePerYear = slope * (1000 * 60 * 60 * 24 * 365); // 연간 변화율

        document.getElementById('summary').innerHTML = `
            <p>최근 eGFR 수치: <strong>${lastVal}</strong></p>
            <p>연간 예상 변화율: <strong>${slopePerYear.toFixed(2)}</strong> ml/min/1.73m²</p>
        `;

        // 미래 예측 날짜 계산 함수
        function getTargetDate(targetY) {
            const targetTime = (targetY - intercept) / slope;
            if (targetTime <= dataPoints[dataPoints.length - 1].x.getTime()) return "이미 도달했거나 데이터 부족";
            return new Date(targetTime).toLocaleDateString();
        }

        document.getElementById('predictions').innerHTML = `
            <div class="prediction-item">3b단계 (eGFR 45) 도달 예상일: <strong>${getTargetDate(45)}</strong></div>
            <div class="prediction-item">4단계 (eGFR 30) 도달 예상일: <strong>${getTargetDate(30)}</strong></div>
            <div class="prediction-item">5단계 (eGFR 15) 도달 예상일: <strong>${getTargetDate(15)}</strong></div>
        `;

        // 그래프 그리기
        drawChart(dataPoints, slope, intercept);
        
        // 결과 영역으로 스크롤
        document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    }

    function drawChart(dataPoints, slope, intercept) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        // 추세선 데이터 생성
        const firstX = dataPoints[0].x.getTime();
        const lastX = dataPoints[dataPoints.length-1].x.getTime();
        const futureX = lastX + (1000 * 60 * 60 * 24 * 365 * 2); // 2년 뒤까지 선 표시

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    label: '실제 eGFR 수치',
                    data: dataPoints,
                    borderColor: '#3498db',
                    backgroundColor: '#3498db',
                    showLine: false,
                    pointRadius: 6
                }, {
                    label: '예상 추세선',
                    data: [
                        {x: new Date(firstX), y: slope * firstX + intercept},
                        {x: new Date(futureX), y: slope * futureX + intercept}
                    ],
                    borderColor: '#e74c3c',
                    borderDash: [5, 5],
                    fill: false,
                    pointRadius: 0
                }]
            },
            options: {
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'month', displayFormats: { month: 'yyyy-MM' } },
                        title: { display: true, text: '날짜' }
                    },
                    y: {
                        min: 0,
                        max: 120,
                        title: { display: true, text: 'eGFR (ml/min/1.73m²)' }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
