<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ELS 베리어 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #181b24; --surface2: #1f2330;
  --border: rgba(255,255,255,0.08); --text: #f0f2f7; --muted: #6b7080;
  --safe: #3dd68c; --safe-bg: rgba(61,214,140,0.10); --safe-border: rgba(61,214,140,0.28);
  --warn: #ff5f5f; --warn-bg: rgba(255,95,95,0.10); --warn-border: rgba(255,95,95,0.28);
  --gold: #f5c842;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; padding:18px 14px 48px; max-width:540px; margin:0 auto; }

/* ── Header ── */
.page-header { margin-bottom:18px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.page-title { font-size:17px; font-weight:700; letter-spacing:-0.02em; }
.page-sub   { font-size:11px; color:var(--muted); margin-top:4px; font-family:'DM Mono',monospace; }

/* ── 새로고침 버튼 ── */
.refresh-btn {
  flex-shrink:0; background:var(--safe-bg); border:1px solid var(--safe-border);
  color:var(--safe); font-size:13px; font-weight:700;
  padding:8px 16px; border-radius:20px; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; display:flex; align-items:center; gap:7px;
  transition:background 0.15s, opacity 0.15s; white-space:nowrap;
}
.refresh-btn:hover  { background:rgba(61,214,140,0.18); }
.refresh-btn:active { opacity:0.7; }
.refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }
.spin-icon { display:inline-block; }
.refresh-btn.loading .spin-icon { animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── 로딩 상태바 ── */
.fetch-status {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px; margin-bottom:16px; font-size:11px; color:var(--muted);
  display:none; font-family:'DM Mono',monospace; line-height:1.9;
}
.fetch-status.show { display:block; }
.fetch-row { display:flex; align-items:center; gap:8px; }
.fetch-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.fetch-dot.ok   { background:var(--safe); }
.fetch-dot.err  { background:var(--warn); }
.fetch-dot.wait { background:var(--muted); animation:pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── Cards ── */
.card { background:var(--surface); border-radius:18px; margin-bottom:16px; overflow:hidden; }
.card.safe { border:1px solid var(--safe-border); }
.card.warn { border:1px solid var(--warn-border); }
.card::before { content:''; display:block; height:2px; }
.card.safe::before { background:linear-gradient(90deg,transparent,var(--safe),transparent); }
.card.warn::before { background:linear-gradient(90deg,transparent,var(--warn),transparent); }

.card-head { padding:14px 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.card-name { font-size:14px; font-weight:700; letter-spacing:-0.01em; }
.card-meta { font-size:10px; color:var(--muted); margin-top:3px; }
.badge { font-size:11px; font-weight:700; padding:4px 11px; border-radius:20px; letter-spacing:0.04em; flex-shrink:0; }
.badge.safe { background:var(--safe-bg); color:var(--safe); border:1px solid var(--safe-border); }
.badge.warn { background:var(--warn-bg); color:var(--warn); border:1px solid var(--warn-border); }

.eval-strip { padding:10px 16px; display:flex; gap:18px; border-bottom:1px solid var(--border); }
.eval-lbl { font-size:9px; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:2px; }
.eval-val { font-size:12px; font-family:'DM Mono',monospace; color:var(--text); }
.eval-val.soon { color:var(--gold); font-weight:700; }

.index-list { padding:0 16px 14px; }
.gap-hero { border-radius:12px; padding:13px 15px; margin:14px 0 10px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.gap-hero.safe { background:var(--safe-bg); border:1px solid var(--safe-border); }
.gap-hero.warn { background:var(--warn-bg); border:1px solid var(--warn-border); }
.hero-tag  { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1px; }
.gap-hero.safe .hero-tag { color:var(--safe); }
.gap-hero.warn .hero-tag { color:var(--warn); }
.hero-pct  { font-size:38px; font-weight:700; font-family:'DM Mono',monospace; letter-spacing:-0.03em; line-height:1; }
.gap-hero.safe .hero-pct { color:var(--safe); }
.gap-hero.warn .hero-pct { color:var(--warn); }
.hero-sub  { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
.hero-right { text-align:right; flex-shrink:0; }
.hero-name    { font-size:10px; color:var(--muted); margin-bottom:2px; }
.hero-now     { font-size:16px; font-weight:500; font-family:'DM Mono',monospace; }
.hero-barrier { font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:2px; }

.idx-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.idx-row:last-child { border-bottom:none; }
.idx-name-col { width:82px; flex-shrink:0; }
.idx-name { font-size:11px; font-weight:500; color:var(--text); }
.idx-barrier-val { font-size:9px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:1px; }
.bar-col { flex:1; position:relative; }
.bar-bg { background:var(--surface2); border-radius:4px; height:7px; position:relative; overflow:visible; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.7s cubic-bezier(0.4,0,0.2,1); }
.bar-fill.safe { background:linear-gradient(90deg,rgba(61,214,140,0.3),var(--safe)); }
.bar-fill.warn { background:linear-gradient(90deg,rgba(255,95,95,0.3),var(--warn)); }
.bar-tick { position:absolute; top:-3px; width:2px; height:13px; background:rgba(255,255,255,0.45); border-radius:1px; }
.idx-gap-col { width:52px; text-align:right; flex-shrink:0; }
.idx-gap-pct { font-size:12px; font-weight:700; font-family:'DM Mono',monospace; }
.idx-gap-pct.safe { color:var(--safe); }
.idx-gap-pct.warn { color:var(--warn); }
.idx-now { font-size:9px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:1px; }

.footer { text-align:center; font-size:10px; color:var(--muted); line-height:1.7; margin-top:4px; }

/* 종가 입력 패널 */
.input-panel {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; margin-bottom:16px; display:none;
}
.input-panel.open { display:block; }
.input-panel-title { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:12px; }
.input-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.input-label { font-size:11px; color:var(--muted); width:100px; flex-shrink:0; font-family:'DM Mono',monospace; }
.price-inp {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; font-size:13px; font-weight:500;
  color:var(--text); font-family:'DM Mono',monospace; outline:none; transition:border-color 0.15s;
}
.price-inp:focus { border-color:var(--safe); }
.apply-btn {
  width:100%; margin-top:6px; background:var(--safe-bg); border:1px solid var(--safe-border);
  color:var(--safe); font-size:13px; font-weight:700; padding:9px;
  border-radius:10px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
}
.apply-btn:hover { background:rgba(61,214,140,0.18); }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">ELS 베리어 현황</div>
    <div class="page-sub" id="asof">—</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="toggleInput()">
    <span class="spin-icon">✎</span>종가 입력
  </button>
</div>

<!-- 종가 입력 패널 -->
<div class="input-panel" id="inputPanel">
  <div class="input-panel-title">직전 종가 입력</div>
  <div class="input-row"><span class="input-label">NIKKEI 225</span><input class="price-inp" id="inp-nk" type="number" step="0.01" inputmode="decimal"></div>
  <div class="input-row"><span class="input-label">S&amp;P 500</span><input class="price-inp" id="inp-sp" type="number" step="0.01" inputmode="decimal"></div>
  <div class="input-row"><span class="input-label">EUROSTOXX 50</span><input class="price-inp" id="inp-eu" type="number" step="0.01" inputmode="decimal"></div>
  <div class="input-row"><span class="input-label">KOSPI 200</span><input class="price-inp" id="inp-ks" type="number" step="0.01" inputmode="decimal"></div>
  <div class="input-row"><span class="input-label">기준일</span><input class="price-inp" id="inp-date" type="date"></div>
  <button class="apply-btn" onclick="applyInput()">적용</button>
</div>
  <div class="fetch-row"><span class="fetch-dot" id="dot-sp"></span><span id="msg-sp">S&amp;P 500 대기 중...</span></div>
  <div class="fetch-row"><span class="fetch-dot" id="dot-eu"></span><span id="msg-eu">EUROSTOXX 50 대기 중...</span></div>
  <div class="fetch-row"><span class="fetch-dot" id="dot-ks"></span><span id="msg-ks">KOSPI 200 대기 중...</span></div>
</div>

<div id="elsList"></div>
<div class="footer" id="footer">—</div>

<script>
// ═══════════════════════════════════════════════
// ELS 상품 정의
// ═══════════════════════════════════════════════
const ELS = [
  { id:1, name:'ELS ① · 1.5억 · 수익률 7.6%',
    meta:'NIKKEI225 + S&P500 + EUROSTOXX50 · 베리어 85% · 만기 2029-02-26',
    eval:'2026-08-26', set:'2026-02-26', warn:false,
    idx:[
      { key:'NK', label:'NIKKEI 225',   base:58753.39,   br:0.85 },
      { key:'SP', label:'S&P 500',      base:6908.86, br:0.85 },
      { key:'EU', label:'EUROSTOXX 50', base:6161.56, br:0.85 },
    ]},
  { id:2, name:'ELS ② · 2억 · 수익률 6.3%',
    meta:'NIKKEI225 + S&P500 + EUROSTOXX50 · 베리어 75% · 만기 2029-02-26',
    eval:'2026-08-26', set:'2026-02-26', warn:false,
    idx:[
      { key:'NK', label:'NIKKEI 225',   base:58753.39,   br:0.75 },
      { key:'SP', label:'S&P 500',      base:6908.86, br:0.75 },
      { key:'EU', label:'EUROSTOXX 50', base:6161.56, br:0.75 },
    ]},
  { id:3, name:'ELS ③ · 5억 · 수익률 8.0%',
    meta:'KOSPI200 + S&P500 + EUROSTOXX50 · 베리어 85% · 만기 2028-12-27',
    eval:'2026-06-25', set:'2025-12-29', warn:true,
    idx:[
      { key:'KS', label:'KOSPI 200',    base:605.69,  br:0.85 },
      { key:'SP', label:'S&P 500',      base:6905.74, br:0.85 },
      { key:'EU', label:'EUROSTOXX 50', base:5751.71, br:0.85 },
    ]},
];

// 스케일 상한 (바 차트용)
const MAX = { NK:70000, SP:8500, EU:8000, KS:1100 };

// 현재가 — localStorage 저장값 우선, 없으면 기본값
function loadSaved() {
  try {
    const s = localStorage.getItem('els_prices');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}
const _saved = loadSaved();
let P = _saved ? { NK:_saved.NK, SP:_saved.SP, EU:_saved.EU, KS:_saved.KS } : { NK:59585.86, SP:7112.21, EU:5917.88, KS:916.60 };
let priceDate = (_saved && _saved.date) ? _saved.date : '2026-04-22';

// ═══════════════════════════════════════════════
// 입력 패널 토글
// ═══════════════════════════════════════════════
function toggleInput() {
  var panel = document.getElementById('inputPanel');
  var isOpen = panel.classList.toggle('open');
  if (isOpen) {
    document.getElementById('inp-nk').value   = P.NK;
    document.getElementById('inp-sp').value   = P.SP;
    document.getElementById('inp-eu').value   = P.EU;
    document.getElementById('inp-ks').value   = P.KS;
    document.getElementById('inp-date').value = priceDate;
  }
}

// ═══════════════════════════════════════════════
// 종가 적용 + localStorage 저장
// ═══════════════════════════════════════════════
function applyInput() {
  var nk   = parseFloat(document.getElementById('inp-nk').value);
  var sp   = parseFloat(document.getElementById('inp-sp').value);
  var eu   = parseFloat(document.getElementById('inp-eu').value);
  var ks   = parseFloat(document.getElementById('inp-ks').value);
  var date = document.getElementById('inp-date').value;

  if ([nk, sp, eu, ks].some(function(v){ return isNaN(v) || v <= 0; })) {
    alert('모든 지수값을 올바르게 입력해주세요.');
    return;
  }

  P = { NK:nk, SP:sp, EU:eu, KS:ks };
  if (date) priceDate = date;

  // localStorage에 저장 (브라우저 종료 후에도 유지)
  try {
    localStorage.setItem('els_prices', JSON.stringify({ NK:nk, SP:sp, EU:eu, KS:ks, date:priceDate }));
  } catch(e) {}

  document.getElementById('inputPanel').classList.remove('open');
  renderAll();
}

// ═══════════════════════════════════════════════
// 렌더링
// ═══════════════════════════════════════════════
function fmt(n, d=0) { return n.toLocaleString('ko-KR',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function calcDday(ds) {
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(ds); d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/864e5);
  return diff===0?'D-day':diff>0?'D-'+diff:'D+'+Math.abs(diff);
}

function renderCard(p) {
  const gaps = p.idx.map(i => {
    const cur = P[i.key], barrier = i.base * i.br;
    return { ...i, cur, barrier, pct: ((cur-barrier)/barrier)*100 };
  });
  const worst = gaps.reduce((a,b) => a.pct<b.pct?a:b);
  const safe = worst.pct >= 0;
  const cc = safe?'card safe':'card warn';
  const bc = safe?'badge safe':'badge warn';
  const hc = safe?'gap-hero safe':'gap-hero warn';
  const rc = safe?'safe':'warn';

  const dday = calcDday(p.eval);
  const ddayClass = p.warn ? 'eval-val soon' : 'eval-val';

  const dec = k => k==='KS'?2:0;
  const heroPct = (worst.pct>=0?'+':'')+worst.pct.toFixed(1)+'%';
  const heroGap = fmt(Math.abs(worst.cur-worst.barrier),dec(worst.key))+'pt '+(worst.cur>=worst.barrier?'위':'아래');

  const rows = gaps.map(g => {
    const max=MAX[g.key], bw=Math.min(Math.max(g.cur/max*100,2),97), tl=Math.min(Math.max(g.barrier/max*100,1),96);
    const gStr=(g.pct>=0?'+':'')+g.pct.toFixed(1)+'%';
    const gr=g.pct>=0?'safe':'warn';
    return `<div class="idx-row">
      <div class="idx-name-col"><div class="idx-name">${g.label}</div><div class="idx-barrier-val">베리어 ${fmt(g.barrier,dec(g.key))}</div></div>
      <div class="bar-col"><div class="bar-bg"><div class="bar-fill ${gr}" style="width:${bw.toFixed(1)}%"></div><div class="bar-tick" style="left:${tl.toFixed(1)}%"></div></div></div>
      <div class="idx-gap-col"><div class="idx-gap-pct ${gr}">${gStr}</div><div class="idx-now">${fmt(g.cur,dec(g.key))}</div></div>
    </div>`;
  }).join('');

  return `<div class="${cc}">
  <div class="card-head">
    <div><div class="card-name">${p.name}</div><div class="card-meta">${p.meta}</div></div>
    <span class="${bc}">${safe?'✓ 안전':'⚠ 주의'}</span>
  </div>
  <div class="eval-strip">
    <div><div class="eval-lbl">1차 평가일</div><div class="eval-val">${p.eval}</div></div>
    <div><div class="eval-lbl">D-day</div><div class="${ddayClass}">${dday}</div></div>
    <div><div class="eval-lbl">설정일</div><div class="eval-val">${p.set}</div></div>
  </div>
  <div class="index-list">
    <div class="${hc}">
      <div>
        <div class="hero-tag">베리어 대비 최소 여유</div>
        <div class="hero-pct">${heroPct}</div>
        <div class="hero-sub">${worst.label} · ${heroGap}</div>
      </div>
      <div class="hero-right">
        <div class="hero-name">현재 / 베리어</div>
        <div class="hero-now">${fmt(worst.cur,dec(worst.key))}</div>
        <div class="hero-barrier">▼ ${fmt(worst.barrier,dec(worst.key))}</div>
      </div>
    </div>
    ${rows}
  </div>
</div>`;
}

function renderAll() {
  document.getElementById('elsList').innerHTML = ELS.map(renderCard).join('');
  const 열람 = new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'});
  document.getElementById('asof').textContent = `기준: ${priceDate} 종가 · 열람 ${열람}`;
  document.getElementById('footer').innerHTML =
    `NIKKEI ${fmt(P.NK,2)} · S&P ${fmt(P.SP,2)} · EUROSTOXX ${fmt(P.EU,2)} · KOSPI200 ${fmt(P.KS,2)}<br>
     투자 결정 시 증권사 공식 시세를 반드시 확인하세요`;
}

// 초기 렌더
renderAll();
</script>
</body>
</html>
